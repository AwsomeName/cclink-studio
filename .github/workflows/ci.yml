name: CI

on:
  push:
    branches: [main, 'codex/**']
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm verify

  smoke:
    needs: verify
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Configure isolated smoke runtime
        run: |
          echo "CCLINK_STUDIO_RUN_DIR=$RUNNER_TEMP/cclink-studio-dev" >> "$GITHUB_ENV"
          echo "CCLINK_STUDIO_LOG_FILE=$RUNNER_TEMP/cclink-studio-dev/cclink-studio-dev.log" >> "$GITHUB_ENV"
          echo "CCLINK_STUDIO_SCREEN_NAME=cclink-studio-ci" >> "$GITHUB_ENV"
      - run: pnpm smoke:standalone
      - run: pnpm smoke:auth-window
      - name: Upload smoke logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cclink-studio-smoke-logs
          path: ${{ runner.temp }}/cclink-studio-dev
          if-no-files-found: ignore
